<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>iii-render</title>
<style>
  :root {
    --bg: #0a0a0b;
    --surface: #141416;
    --surface2: #1c1c20;
    --border: #2a2a30;
    --text: #e4e4e7;
    --text2: #a1a1aa;
    --accent: #6366f1;
    --accent2: #818cf8;
    --green: #22c55e;
    --red: #ef4444;
    --orange: #f59e0b;
    --radius: 8px;
    --json-key: #818cf8;
    --json-str: #22c55e;
    --json-num: #f59e0b;
    --json-bool: #f472b6;
    --json-brace: #a1a1aa;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    overflow: hidden;
  }

  .app {
    display: grid;
    grid-template-rows: 52px 1fr;
    height: 100vh;
  }

  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 20px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
  }

  header h1 {
    font-size: 15px;
    font-weight: 600;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  header h1 span { color: var(--accent2); font-weight: 700; }

  .header-controls {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .status {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 11px;
    color: var(--text2);
  }

  .status-dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: var(--red);
  }

  .status-dot.connected { background: var(--green); }

  .prompt-bar {
    display: flex;
    align-items: center;
    gap: 8px;
    flex: 1;
    max-width: 700px;
    margin: 0 24px;
  }

  .prompt-bar input {
    flex: 1;
    height: 34px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    color: var(--text);
    font-size: 13px;
    padding: 0 12px;
    outline: none;
  }

  .prompt-bar input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 2px rgba(99,102,241,0.15);
  }

  .prompt-bar .btn {
    height: 34px;
    padding: 0 16px;
    border: none;
    border-radius: var(--radius);
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    white-space: nowrap;
    transition: all 0.15s;
  }

  .btn-primary { background: var(--accent); color: white; }
  .btn-primary:hover { background: var(--accent2); }
  .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }

  .btn-ghost {
    background: transparent;
    color: var(--text2);
    border: 1px solid var(--border);
  }
  .btn-ghost:hover { color: var(--text); background: var(--surface2); }
  .btn-ghost:disabled { opacity: 0.4; cursor: not-allowed; }

  .main {
    display: grid;
    grid-template-columns: 1fr 1fr;
    overflow: hidden;
  }

  .panel {
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .panel:first-child { border-right: 1px solid var(--border); }

  .panel-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 8px 16px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: var(--text2);
  }

  .panel-header .badge {
    font-size: 10px;
    padding: 2px 8px;
    border-radius: 10px;
    font-weight: 500;
    text-transform: none;
    letter-spacing: 0;
  }

  .badge-streaming {
    background: rgba(99,102,241,0.15);
    color: var(--accent2);
    display: flex;
    align-items: center;
    gap: 4px;
  }

  .badge-streaming .dot {
    width: 5px;
    height: 5px;
    background: var(--accent);
    border-radius: 50%;
    animation: pulse 1s infinite;
  }

  .badge-cached {
    background: rgba(34,197,94,0.15);
    color: var(--green);
  }

  .badge-done {
    background: rgba(255,255,255,0.06);
    color: var(--text2);
  }

  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }

  .json-panel {
    flex: 1;
    overflow-y: auto;
    padding: 16px;
    font-family: "SF Mono", "Fira Code", "JetBrains Mono", Menlo, monospace;
    font-size: 12.5px;
    line-height: 1.65;
    white-space: pre-wrap;
    word-break: break-word;
    position: relative;
  }

  .json-panel .cursor {
    display: inline-block;
    width: 2px;
    height: 15px;
    background: var(--accent);
    animation: blink 0.6s step-end infinite;
    vertical-align: text-bottom;
    margin-left: 1px;
  }

  @keyframes blink { 0%,100% { opacity: 1; } 50% { opacity: 0; } }

  .json-panel .j-key { color: var(--json-key); }
  .json-panel .j-str { color: var(--json-str); }
  .json-panel .j-num { color: var(--json-num); }
  .json-panel .j-bool { color: var(--json-bool); }
  .json-panel .j-brace { color: var(--json-brace); }
  .json-panel .j-null { color: var(--text2); }

  .preview-panel {
    flex: 1;
    overflow-y: auto;
    padding: 24px;
  }

  .preview-empty {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100%;
    color: var(--text2);
    font-size: 13px;
    gap: 8px;
  }

  .preview-empty kbd {
    font-size: 11px;
    padding: 2px 6px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 4px;
    font-family: inherit;
  }

  .bottom-bar {
    display: flex;
    gap: 12px;
    padding: 0 16px;
    background: var(--surface);
    border-top: 1px solid var(--border);
    font-size: 11px;
    color: var(--text2);
    height: 28px;
    align-items: center;
    grid-column: 1 / -1;
  }

  .bottom-bar strong { color: var(--text); }

  .catalog-drawer {
    position: fixed;
    top: 52px;
    right: 0;
    width: 420px;
    height: calc(100vh - 52px);
    background: var(--surface);
    border-left: 1px solid var(--border);
    z-index: 100;
    transform: translateX(100%);
    transition: transform 0.2s ease;
    display: flex;
    flex-direction: column;
  }

  .catalog-drawer.open { transform: translateX(0); }

  .drawer-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 16px;
    border-bottom: 1px solid var(--border);
  }

  .drawer-header h3 { font-size: 13px; font-weight: 600; }

  .drawer-close {
    background: none;
    border: none;
    color: var(--text2);
    font-size: 18px;
    cursor: pointer;
    padding: 0 4px;
  }

  .drawer-body {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    padding: 12px 16px;
    gap: 12px;
  }

  .catalog-presets {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
  }

  .preset-chip {
    padding: 4px 10px;
    border-radius: 12px;
    font-size: 11px;
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text2);
    cursor: pointer;
    transition: all 0.15s;
  }

  .preset-chip:hover, .preset-chip.active {
    border-color: var(--accent);
    color: var(--accent2);
    background: rgba(99,102,241,0.1);
  }

  .drawer-body textarea {
    flex: 1;
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    color: var(--text);
    font-family: "SF Mono", "Fira Code", monospace;
    font-size: 11px;
    padding: 10px;
    resize: none;
    outline: none;
    tab-size: 2;
  }

  .drawer-body textarea:focus { border-color: var(--accent); }

  .overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.4);
    z-index: 99;
    display: none;
  }

  .overlay.open { display: block; }

  .iii-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px;
  }

  .iii-card h3 {
    font-size: 16px;
    font-weight: 600;
    margin-bottom: 16px;
    color: var(--text);
  }

  .iii-card > div { margin-top: 12px; }

  .iii-button button {
    padding: 10px 20px;
    border: none;
    border-radius: var(--radius);
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    background: var(--surface2);
    color: var(--text);
    border: 1px solid var(--border);
  }

  .iii-button button.iii-primary {
    background: var(--accent);
    color: white;
    border-color: var(--accent);
  }

  .iii-button button.iii-secondary {
    background: var(--surface2);
    color: var(--text);
  }

  .iii-button button.iii-danger {
    background: var(--red);
    color: white;
    border-color: var(--red);
  }

  .iii-input input {
    width: 100%;
    padding: 10px 12px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    color: var(--text);
    font-size: 14px;
    outline: none;
  }

  .iii-input input:focus { border-color: var(--accent); }

  .iii-text p { color: var(--text); line-height: 1.6; }

  .iii-link a {
    color: var(--accent2);
    text-decoration: none;
    font-size: 13px;
  }

  .iii-link a:hover { text-decoration: underline; }

  .iii-metric {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .iii-metric-label {
    font-size: 12px;
    color: var(--text2);
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .iii-metric-value {
    font-size: 28px;
    font-weight: 700;
    color: var(--text);
  }

  .iii-table table {
    width: 100%;
    border-collapse: collapse;
  }

  .iii-table th, .iii-table td {
    padding: 8px 12px;
    text-align: left;
    border-bottom: 1px solid var(--border);
    font-size: 13px;
  }

  .iii-table th {
    color: var(--text2);
    font-weight: 600;
    font-size: 11px;
    text-transform: uppercase;
  }

  .iii-list ul { list-style: none; }
  .iii-list li { padding: 8px 0; border-bottom: 1px solid var(--border); }

  .iii-unknown {
    padding: 8px;
    background: rgba(245,158,11,0.1);
    border: 1px dashed var(--orange);
    border-radius: var(--radius);
    font-size: 12px;
  }

  .iii-type-label { font-weight: 600; color: var(--orange); }
  .iii-unknown pre { margin-top: 4px; font-size: 10px; color: var(--text2); }

  .iii-skeleton {
    padding: 16px;
    border-radius: var(--radius);
    background: var(--surface2);
    border: 1px dashed var(--border);
    margin: 8px 0;
    overflow: hidden;
  }

  .skeleton-bar {
    height: 14px;
    background: linear-gradient(90deg, var(--border) 25%, var(--surface) 50%, var(--border) 75%);
    background-size: 200% 100%;
    border-radius: 4px;
    margin-bottom: 8px;
    animation: shimmer 1.5s infinite;
  }

  .skeleton-bar.short { width: 60%; }

  @keyframes shimmer {
    0% { background-position: 200% 0; }
    100% { background-position: -200% 0; }
  }

  @keyframes streamIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .stream-in { animation: streamIn 0.3s ease-out; }
</style>
</head>
<body>
<div class="app">
  <header>
    <h1><span>iii</span>-render</h1>
    <div class="prompt-bar">
      <input type="text" id="prompt" placeholder="Describe a UI..." value="A dashboard with three metric cards showing revenue, users, and orders, plus a data table below" />
      <button class="btn btn-primary" id="streamBtn" onclick="doStream()">Stream</button>
      <button class="btn btn-ghost" id="generateBtn" onclick="doGenerate()">Instant</button>
      <button class="btn btn-ghost" id="refineBtn" onclick="doRefine()" disabled title="Generate first, then refine">Refine</button>
      <button class="btn btn-ghost" onclick="toggleDrawer()">Catalog</button>
    </div>
    <div class="status">
      <div class="status-dot" id="statusDot"></div>
      <span id="statusText">...</span>
    </div>
  </header>

  <div class="main">
    <div class="panel">
      <div class="panel-header">
        <span>JSON Spec</span>
        <span class="badge" id="jsonBadge"></span>
      </div>
      <div class="json-panel" id="jsonPanel">
        <span class="j-brace" style="color:var(--text2);font-size:13px">Type a prompt and press Stream to see the JSON appear live...</span>
      </div>
    </div>
    <div class="panel">
      <div class="panel-header">
        <span>Preview</span>
        <span id="previewMeta" style="font-weight:400;text-transform:none;letter-spacing:0"></span>
      </div>
      <div class="preview-panel" id="previewPanel">
        <div class="preview-empty">
          <span>Rendered UI will appear here</span>
        </div>
      </div>
    </div>
  </div>
</div>

<div class="overlay" id="overlay" onclick="toggleDrawer()"></div>
<div class="catalog-drawer" id="drawer">
  <div class="drawer-header">
    <h3>Component Catalog</h3>
    <button class="drawer-close" onclick="toggleDrawer()">&times;</button>
  </div>
  <div class="drawer-body">
    <div class="catalog-presets">
      <div class="preset-chip active" onclick="loadPreset('dashboard', this)">Dashboard</div>
      <div class="preset-chip" onclick="loadPreset('form', this)">Forms</div>
      <div class="preset-chip" onclick="loadPreset('ecommerce', this)">E-Commerce</div>
      <div class="preset-chip" onclick="loadPreset('minimal', this)">Minimal</div>
    </div>
    <label style="font-size:11px;color:var(--text2)">Refine prompt (edit existing spec):</label>
    <input type="text" id="refinePrompt" placeholder="e.g. Add a search bar at the top" style="width:100%;height:34px;background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);color:var(--text);font-size:13px;padding:0 12px;outline:none" />
    <textarea id="catalogEditor"></textarea>
  </div>
</div>

<script>
const BASE = window.location.origin;
let currentSpec = null;

const PRESETS = {
  dashboard: {
    components: {
      Card: { description: "Container card with optional title", props: { title: "string" }, children: true },
      Metric: { description: "Displays a key metric", props: { label: "string", value: "string", change: "string" } },
      Table: { description: "Data table", props: { columns: "string[]", rows: "array" } },
      Button: { description: "Clickable button", props: { label: "string", variant: "primary|secondary|danger" } },
      Text: { description: "Text paragraph", props: { content: "string" } },
      Input: { description: "Text input field", props: { placeholder: "string", type: "string" } },
      Link: { description: "Hyperlink", props: { text: "string", href: "string" } },
    },
    actions: { navigate: { description: "Navigate to a page" }, refresh: { description: "Refresh data" } },
  },
  form: {
    components: {
      Card: { description: "Container card", props: { title: "string" }, children: true },
      Input: { description: "Text input", props: { placeholder: "string", type: "text|email|password|number", label: "string" } },
      Button: { description: "Button", props: { label: "string", variant: "primary|secondary" } },
      Text: { description: "Text/label", props: { content: "string" } },
      Link: { description: "Hyperlink", props: { text: "string", href: "string" } },
    },
    actions: { submit: { description: "Submit form" }, reset: { description: "Reset form" } },
  },
  ecommerce: {
    components: {
      Card: { description: "Product or content card", props: { title: "string" }, children: true },
      Image: { description: "Product image", props: { src: "string", alt: "string" } },
      Text: { description: "Text content", props: { content: "string" } },
      Button: { description: "Action button", props: { label: "string", variant: "primary|secondary|danger" } },
      Metric: { description: "Price or stat display", props: { label: "string", value: "string" } },
      List: { description: "Item list", props: { items: "array" }, children: true },
    },
    actions: { addToCart: { description: "Add item to cart" }, checkout: { description: "Proceed to checkout" } },
  },
  minimal: {
    components: {
      Card: { description: "Container", children: true },
      Text: { description: "Text", props: { content: "string" } },
      Button: { description: "Button", props: { label: "string" } },
    },
    actions: {},
  },
};

function getCatalog() {
  try { return JSON.parse(document.getElementById("catalogEditor").value); }
  catch { return null; }
}

function loadPreset(name, el) {
  document.querySelectorAll(".preset-chip").forEach(c => c.classList.remove("active"));
  if (el) el.classList.add("active");
  document.getElementById("catalogEditor").value = JSON.stringify(PRESETS[name], null, 2);
}

function toggleDrawer() {
  document.getElementById("drawer").classList.toggle("open");
  document.getElementById("overlay").classList.toggle("open");
}

function setLoading(on) {
  document.getElementById("streamBtn").disabled = on;
  document.getElementById("generateBtn").disabled = on;
}

function setBadge(type, text) {
  const b = document.getElementById("jsonBadge");
  b.className = "badge";
  if (type === "streaming") { b.classList.add("badge-streaming"); b.innerHTML = `<span class="dot"></span>${text}`; }
  else if (type === "cached") { b.classList.add("badge-cached"); b.textContent = text; }
  else { b.classList.add("badge-done"); b.textContent = text; }
}

function syntaxHighlight(json) {
  return json
    .replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;")
    .replace(/("(\\u[a-zA-Z0-9]{4}|\\[^u]|[^\\"])*"(\s*:)?)/g, (match) => {
      if (/:$/.test(match)) return `<span class="j-key">${match}</span>`;
      return `<span class="j-str">${match}</span>`;
    })
    .replace(/\b(-?\d+\.?\d*([eE][+-]?\d+)?)\b/g, '<span class="j-num">$1</span>')
    .replace(/\b(true|false)\b/g, '<span class="j-bool">$1</span>')
    .replace(/\bnull\b/g, '<span class="j-null">null</span>');
}

function renderSpec(spec) {
  const area = document.getElementById("previewPanel");
  area.innerHTML = "";
  const el = renderElement(spec, spec.root);
  if (el) area.appendChild(el);
}

function renderElement(spec, id) {
  const el = spec.elements[id];
  if (!el) return null;
  const node = document.createElement("div");
  node.dataset.iiiId = id;

  switch (el.type) {
    case "Card":
      node.className = "iii-card";
      if (el.props.title) { const h = document.createElement("h3"); h.textContent = el.props.title; node.appendChild(h); }
      break;
    case "Button": {
      const btn = document.createElement("button");
      btn.className = "iii-button";
      btn.textContent = el.props.label ?? "Button";
      if (el.props.variant === "primary") btn.classList.add("iii-primary");
      if (el.props.variant === "secondary") btn.classList.add("iii-secondary");
      if (el.props.variant === "danger") btn.classList.add("iii-danger");
      node.appendChild(btn);
      break;
    }
    case "Input": {
      if (el.props.label) { const l = document.createElement("label"); l.textContent = el.props.label; l.style.cssText = "display:block;font-size:12px;color:var(--text2);margin-bottom:4px"; node.appendChild(l); }
      const inp = document.createElement("input");
      inp.className = "iii-input";
      if (el.props.placeholder) inp.placeholder = el.props.placeholder;
      if (el.props.type) inp.type = el.props.type;
      node.appendChild(inp);
      break;
    }
    case "Text": {
      const p = document.createElement("p"); p.className = "iii-text"; p.textContent = el.props.content ?? el.props.text ?? ""; node.appendChild(p);
      break;
    }
    case "Link": {
      const a = document.createElement("a"); a.className = "iii-link"; a.textContent = el.props.text ?? el.props.label ?? "Link"; a.href = el.props.href ?? "#"; node.appendChild(a);
      break;
    }
    case "Metric": {
      const m = document.createElement("div"); m.className = "iii-metric";
      if (el.props.label) { const l = document.createElement("span"); l.className = "iii-metric-label"; l.textContent = el.props.label; m.appendChild(l); }
      const v = document.createElement("span"); v.className = "iii-metric-value"; v.textContent = el.props.value ?? ""; m.appendChild(v);
      if (el.props.change) { const c = document.createElement("span"); c.style.cssText = `font-size:12px;color:${String(el.props.change).startsWith("+") || String(el.props.change).startsWith("\u2191") ? "var(--green)" : "var(--red)"}`; c.textContent = el.props.change; m.appendChild(c); }
      node.appendChild(m);
      break;
    }
    case "Table": {
      const t = document.createElement("table"); t.className = "iii-table";
      if (Array.isArray(el.props.columns)) { const th = document.createElement("thead"); const tr = document.createElement("tr"); for (const c of el.props.columns) { const td = document.createElement("th"); td.textContent = c; tr.appendChild(td); } th.appendChild(tr); t.appendChild(th); }
      if (Array.isArray(el.props.rows)) { const tb = document.createElement("tbody"); for (const row of el.props.rows) { const tr = document.createElement("tr"); const vals = Array.isArray(row) ? row : Object.values(row); for (const c of vals) { const td = document.createElement("td"); td.textContent = String(c); tr.appendChild(td); } tb.appendChild(tr); } t.appendChild(tb); }
      node.appendChild(t);
      break;
    }
    case "List": {
      const ul = document.createElement("ul"); ul.className = "iii-list";
      if (Array.isArray(el.props.items)) { for (const it of el.props.items) { const li = document.createElement("li"); li.textContent = String(it); ul.appendChild(li); } }
      node.appendChild(ul);
      break;
    }
    case "Image": {
      const img = document.createElement("img"); img.className = "iii-image"; img.style.maxWidth = "100%";
      if (el.props.src) img.src = el.props.src; if (el.props.alt) img.alt = el.props.alt;
      node.appendChild(img);
      break;
    }
    default: {
      node.className = "iii-unknown";
      const l = document.createElement("span"); l.textContent = `[${el.type}]`; l.className = "iii-type-label"; node.appendChild(l);
      if (el.props && Object.keys(el.props).length) { const pre = document.createElement("pre"); pre.textContent = JSON.stringify(el.props, null, 2); node.appendChild(pre); }
    }
  }

  for (const childId of (el.children || [])) {
    const child = renderElement(spec, childId);
    if (child) node.appendChild(child);
  }
  return node;
}

function renderStreamElement(spec, id) {
  const el = spec.elements[id];
  if (!el) {
    const ph = document.createElement("div");
    ph.className = "iii-skeleton";
    ph.innerHTML = '<div class="skeleton-bar"></div><div class="skeleton-bar short"></div>';
    return ph;
  }
  const node = renderElement(spec, id);
  if (node) node.classList.add("stream-in");
  return node;
}

async function doStream() {
  const catalog = getCatalog();
  if (!catalog) { toggleDrawer(); return; }
  const prompt = document.getElementById("prompt").value.trim();
  if (!prompt) return;

  setLoading(true);
  setBadge("streaming", "Streaming");

  const jsonPanel = document.getElementById("jsonPanel");
  const previewPanel = document.getElementById("previewPanel");
  jsonPanel.innerHTML = "";
  previewPanel.innerHTML = '<div class="preview-empty"><span>Waiting for Claude...</span></div>';

  let rawJson = "";
  const partialSpec = { root: "", elements: {} };
  const eventQueue = [];
  let processing = false;
  let doneData = null;

  function updateJsonPanel() {
    jsonPanel.innerHTML = syntaxHighlight(rawJson) + '<span class="cursor"></span>';
    jsonPanel.scrollTop = jsonPanel.scrollHeight;
  }

  function updatePreview() {
    if (!partialSpec.root) return;
    previewPanel.innerHTML = "";
    const el = renderStreamElement(partialSpec, partialSpec.root);
    if (el) previewPanel.appendChild(el);
  }

  async function processQueue() {
    if (processing) return;
    processing = true;
    while (eventQueue.length > 0) {
      const { type, data } = eventQueue.shift();
      if (type === "text") {
        rawJson += data.text;
        updateJsonPanel();
      } else if (type === "root") {
        partialSpec.root = data.root;
        updatePreview();
      } else if (type === "element") {
        partialSpec.elements[data.id] = data.element;
        updatePreview();
        document.getElementById("previewMeta").textContent = `${Object.keys(partialSpec.elements).length} elements`;
      } else if (type === "done") {
        doneData = data;
      } else if (type === "error") {
        setBadge("done", "Error");
        jsonPanel.innerHTML = `<span style="color:var(--red)">${data.error}</span>`;
      }
    }

    if (doneData) {
      currentSpec = doneData.spec;
      document.getElementById("refineBtn").disabled = false;

      const pretty = JSON.stringify(doneData.spec, null, 2);
      jsonPanel.innerHTML = syntaxHighlight(pretty);

      renderSpec(currentSpec);

      const n = Object.keys(doneData.spec.elements).length;
      document.getElementById("previewMeta").textContent = `${n} elements`;
      if (doneData.cached) {
        setBadge("cached", `Cached (${n} elements)`);
      } else {
        setBadge("done", `${n} elements`);
      }
      setLoading(false);
      doneData = null;
    }
    processing = false;
  }

  try {
    const res = await fetch(`${BASE}/stream`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ prompt, catalog }),
    });

    const reader = res.body.getReader();
    const decoder = new TextDecoder();
    let buffer = "";
    let currentEvent = "";

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buffer += decoder.decode(value, { stream: true });
      const lines = buffer.split("\n");
      buffer = lines.pop() ?? "";

      for (const line of lines) {
        if (line.startsWith("event: ")) {
          currentEvent = line.slice(7).trim();
        } else if (line.startsWith("data: ")) {
          try {
            const data = JSON.parse(line.slice(6));
            eventQueue.push({ type: currentEvent, data });
            processQueue();
          } catch {}
        }
      }
    }
    await processQueue();
    if (!doneData && !currentSpec) setLoading(false);
  } catch (e) {
    setBadge("done", "Error");
    jsonPanel.innerHTML = `<span style="color:var(--red)">${e.message}</span>`;
    setLoading(false);
  }
}

async function doGenerate() {
  const catalog = getCatalog();
  if (!catalog) { toggleDrawer(); return; }
  const prompt = document.getElementById("prompt").value.trim();
  if (!prompt) return;

  setLoading(true);
  setBadge("streaming", "Generating");

  const jsonPanel = document.getElementById("jsonPanel");
  jsonPanel.innerHTML = '<span style="color:var(--text2)">Generating...</span>';

  try {
    const res = await fetch(`${BASE}/generate`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ prompt, catalog }),
    });
    const data = await res.json();
    if (!res.ok) {
      setBadge("done", "Error");
      jsonPanel.innerHTML = `<span style="color:var(--red)">${data.error}</span>`;
      return;
    }

    currentSpec = data.spec;
    const pretty = JSON.stringify(data.spec, null, 2);
    jsonPanel.innerHTML = syntaxHighlight(pretty);
    renderSpec(currentSpec);
    document.getElementById("refineBtn").disabled = false;

    const n = Object.keys(data.spec.elements).length;
    document.getElementById("previewMeta").textContent = `${n} elements | ${data.generation_ms}ms`;
    setBadge(data.cached ? "cached" : "done", `${n} elements | ${data.generation_ms}ms${data.cached ? " | cached" : ""}`);
  } catch (e) {
    setBadge("done", "Error");
    jsonPanel.innerHTML = `<span style="color:var(--red)">${e.message}</span>`;
  } finally {
    setLoading(false);
  }
}

async function doRefine() {
  if (!currentSpec) return;
  const catalog = getCatalog();
  if (!catalog) { toggleDrawer(); return; }
  const prompt = document.getElementById("refinePrompt").value.trim() || document.getElementById("prompt").value.trim();
  if (!prompt) return;

  setLoading(true);
  setBadge("streaming", "Refining");

  try {
    const res = await fetch(`${BASE}/refine`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ prompt, current_spec: currentSpec, catalog }),
    });
    const data = await res.json();
    if (!res.ok) {
      setBadge("done", "Error");
      document.getElementById("jsonPanel").innerHTML = `<span style="color:var(--red)">${data.error}</span>`;
      return;
    }

    currentSpec = data.spec;
    const pretty = JSON.stringify(data.spec, null, 2);
    document.getElementById("jsonPanel").innerHTML = syntaxHighlight(pretty);
    renderSpec(currentSpec);

    const n = Object.keys(data.spec.elements).length;
    document.getElementById("previewMeta").textContent = `${n} elements | ${data.patch_count} patches | ${data.generation_ms}ms`;
    setBadge("done", `${data.patch_count} patches | ${data.generation_ms}ms`);
    document.getElementById("refinePrompt").value = "";
  } catch (e) {
    setBadge("done", "Error");
  } finally {
    setLoading(false);
  }
}

async function checkHealth() {
  try {
    const res = await fetch(`${BASE}/health`);
    const dot = document.getElementById("statusDot");
    const txt = document.getElementById("statusText");
    if (res.ok) { dot.classList.add("connected"); txt.textContent = "Connected"; }
    else { dot.classList.remove("connected"); txt.textContent = "Disconnected"; }
  } catch {
    document.getElementById("statusDot").classList.remove("connected");
    document.getElementById("statusText").textContent = "Disconnected";
  }
}

document.getElementById("prompt").addEventListener("keydown", (e) => {
  if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); doStream(); }
});

loadPreset("dashboard", document.querySelector(".preset-chip"));
checkHealth();
setInterval(checkHealth, 5000);
</script>
