modules:
  - class: modules::state::StateModule
    config:
      adapter:
        class: modules::state::adapters::KvStore
        config:
          store_method: in_memory

  - class: modules::api::RestApiModule
    config:
      port: 3111
      host: 127.0.0.1
      default_timeout: 30000
      concurrency_request_limit: 1024
      cors:
        allowed_origins:
          - http://localhost:3112
          - http://localhost:3111
          - http://localhost:3000
          - http://localhost:5173
          - http://localhost:8888
        allowed_methods:
          - GET
          - POST
          - PUT
          - DELETE
          - OPTIONS

  - class: modules::observability::OtelModule
    config:
      enabled: false

  - class: modules::pubsub::PubSubModule
    config:
      adapter:
        class: modules::pubsub::LocalAdapter

  - class: modules::cron::CronModule
    config:
      adapter:
        class: modules::cron::KvCronAdapter

  - class: modules::worker::WorkerModule
    config:
      host: 0.0.0.0
      port: 49134

  - class: modules::worker::WorkerModule
    config:
      host: 127.0.0.1
      port: 49135
      rbac:
        expose_functions:
          - match("api::*")
          - match("spec-forge::join-session")
          - match("spec-forge::leave-session")
          - match("spec-forge::push-patch")
          - match("ui::render-patch::*")

  - class: modules::stream::StreamModule
    config:
      port: 3113
      adapter:
        class: modules::stream::adapters::KvStore
        config:
          store_method: file_based
          file_path: ./data/stream_store
